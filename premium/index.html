        const ITEMS_PER_PAGE = 9;
        let currentPage = 1;
        let filteredData = [...dummyData];

        const paginationContainer = document.getElementById('pagination');

        // Fungsi Render Cards
        function renderCards() {
            cardContainer.innerHTML = '';

            if (filteredData.length === 0) {
                cardContainer.innerHTML = `<div class="empty-state">Tidak ada artikel yang sesuai dengan pencarian Anda.</div>`;
                return;
            }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const cardsToShow = filteredData.slice(startIndex, endIndex);

            cardsToShow.forEach(item => {
                const cardHTML = `
                    <div class="col-lg-4 col-md-6">
                      <a href="${item.link}" class="text-decoration-none">
                      <div class="card overflow-hidden hover-img h-100">
                        <div class="position-relative">
                          <img src="${item.coverImg}" class="card-img-top w-100" alt="cover-img">
                        </div>
                        <div class="card-body p-4 mt-2">
                          <span class="badge text-bg-light fs-6 py-1 px-2 lh-sm mt-2">${item.codes || ''}</span>
                          <span class="badge text-bg-light fs-6 py-1 px-2 lh-sm mt-2">${item.tags || ''}</span>
                          <h5 class="d-block my-4 fs-5 text-dark fw-semibold link-primary">${item.names || ''}</h5>
                          <div class="d-flex align-items-center gap-4">
                            <div class="d-flex align-items-center gap-2 text-dark">
                              <i class="ti ti-eye text-dark fs-5"></i>${item.views || '-'}
                            </div>
                            <div class="d-flex align-items-center gap-2 text-dark">
                              <i class="ti ti-message-2 text-dark fs-5"></i>${item.comments || '-'}
                            </div>
                            <div class="d-flex align-items-center text-dark ms-auto">
                              <i class="ti ti-point text-dark"></i>${item.date || ''}
                            </div>
                          </div>
                        </div>
                      </div>
                      </a>
                    </div>
                `;
                cardContainer.insertAdjacentHTML('beforeend', cardHTML);
            });

            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
        }

        // Fungsi Render Paginasi
        function renderPagination() {
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = 'Prev';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) { currentPage--; updateView(); }
            });
            paginationContainer.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i; updateView();
                });
                paginationContainer.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = 'Next';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) { currentPage++; updateView(); }
            });
            paginationContainer.appendChild(nextBtn);
        }

        function updateView() {
            renderCards();
            renderPagination();
        }
                
        // Event Listener Pencarian
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            filteredData = dummyData.filter(item => 
                (item.title?.toLowerCase().includes(query)) || 
                (item.category?.toLowerCase().includes(query)) ||
                (item.authorName?.toLowerCase().includes(query)) ||
                (item.names?.toLowerCase().includes(query)) ||
                (item.tags?.toLowerCase().includes(query)) ||
                (item.codes?.toLowerCase().includes(query))
            );
            
            currentPage = 1;
            updateView();
        });

        // Inisialisasi Awal
        updateView();
