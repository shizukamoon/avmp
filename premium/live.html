<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊び人</title>
    
    <!-- Masukkan kode favicon di sini -->
    <link rel="icon" type="image/svg+xml" href="heel.svg">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

    <link rel="stylesheet" href="css/css.css">

</head>
<body>

    <!-- Navbar -->
    <navbar>
        <a href="#" class="logo">
            <img src="heel.svg">Shizuka
        </a>
        
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>

        <div class="nav-wrapper" id="navWrapper">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="live.html" class="active">Live</a></li>
                <li><a href="#">Model</a></li>
                <li><a href="#">Studio</a></li>
            </ul>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search">
                <i class="ti ti-search search-icon"></i>
            </div>
        </div>
    </navbar>

    <!-- Main Content -->
    <main>
        <!-- Menggunakan Bootstrap Row untuk Grid -->
        <div class="row g-4" id="cardContainer">
            <!-- Card dari JavaScript akan masuk ke sini -->
        </div>

        <!-- Pagination -->
        <div class="pagination-container" id="pagination"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const dummyData = [
            {link: "https://streamtape.com/v/adAGBjvYYpTxG4a/enc_Anne_Anne_chan_2025-11-16-20_28.mp4", coverImg: "https://alive-video.com/wp-content/uploads/2026/07/20260708.webp", 
            codes: "Pussy Play", 
            tags: "MyLovely", 
            names: "Anne_Anne_chan", 
            views: "-", comments: "-", date: "2025, Nov 20" },
            {link: "https://streamtape.com/v/apMawr06y2Cx6O1/enc_Ruru-shuv_2025-11-16-20_38.mp4", coverImg: "https://alive-video.com/wp-content/uploads/2026/07/20260709.webp", 
            codes: "Sex", 
            tags: "Favorite", 
            names: "Ruru-shuv", 
            views: "-", comments: "-", date: "2025, Nov 16" },
            {link: "https://streamtape.com/v/vpakmKOoWQHw6O/enc_--mari--_Stripchat_2025-11-16-14_20.mp4", coverImg: "https://alive-video.com/wp-content/uploads/2026/07/20260705.webp", 
            codes: "Pussy Play", 
            tags: "Favorite", 
            names: "-mari-", 
            views: "-", comments: "-", date: "2025, Nov 16" },
            {link: "https://streamtape.com/v/oDJxaD2OJOfJrJe/enc_Natsuki_summer2_Stripchat_2025-04-20-19_18.mp4", coverImg: "https://alive-video.com/wp-content/uploads/2025/10/2025103106.webp", 
            codes: "Pussy Play", 
            tags: "MyLovely", 
            names: "Natsuki_summer2", 
            views: "-", comments: "-", date: "2025, Apr 20" }
        ];

        /* === BURGER MENU LOGIC === */
        const hamburger = document.getElementById('hamburger');
        const navWrapper = document.getElementById('navWrapper');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navWrapper.classList.toggle('active');
        });

        /* === APP LOGIC (Search & Pagination) === */
        const ITEMS_PER_PAGE = 9;
        let currentPage = 1;
        let filteredData = [...dummyData];

        const cardContainer = document.getElementById('cardContainer');
        const paginationContainer = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');

        // Fungsi Render Cards
        function renderCards() {
            cardContainer.innerHTML = '';

            if (filteredData.length === 0) {
                cardContainer.innerHTML = `<div class="empty-state">Tidak ada artikel yang sesuai dengan pencarian Anda.</div>`;
                return;
            }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const cardsToShow = filteredData.slice(startIndex, endIndex);

            cardsToShow.forEach(item => {
                const cardHTML = `
                    <div class="col-lg-4 col-md-6">
                      <a href="${item.link}" class="text-decoration-none">
                      <div class="card overflow-hidden hover-img h-100">
                        <div class="position-relative">
                          <img src="${item.coverImg}" class="card-img-top w-100" alt="cover-img">
                        </div>
                        <div class="card-body p-4 mt-2">
                          <span class="badge text-bg-light fs-6 py-1 px-2 lh-sm mt-2">${item.codes || ''}</span>
                          <span class="badge text-bg-light fs-6 py-1 px-2 lh-sm mt-2">${item.tags || ''}</span>
                          <h5 class="d-block my-4 fs-5 text-dark fw-semibold link-primary">${item.names || ''}</h5>
                          <div class="d-flex align-items-center gap-4">
                            <div class="d-flex align-items-center gap-2 text-dark">
                              <i class="ti ti-eye text-dark fs-5"></i>${item.views || '-'}
                            </div>
                            <div class="d-flex align-items-center gap-2 text-dark">
                              <i class="ti ti-message-2 text-dark fs-5"></i>${item.comments || '-'}
                            </div>
                            <div class="d-flex align-items-center text-dark ms-auto">
                              <i class="ti ti-point text-dark"></i>${item.date || ''}
                            </div>
                          </div>
                        </div>
                      </div>
                      </a>
                    </div>
                `;
                cardContainer.insertAdjacentHTML('beforeend', cardHTML);
            });

            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
        }

        // Fungsi Render Paginasi
        function renderPagination() {
            paginationContainer.innerHTML = '';
            const totalPages = Math.ceil(filteredData.length / ITEMS_PER_PAGE);

            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = 'Prev';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) { currentPage--; updateView(); }
            });
            paginationContainer.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i; updateView();
                });
                paginationContainer.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = 'Next';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) { currentPage++; updateView(); }
            });
            paginationContainer.appendChild(nextBtn);
        }

        function updateView() {
            renderCards();
            renderPagination();
        }
                
        // Event Listener Pencarian
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            filteredData = dummyData.filter(item => 
                (item.title?.toLowerCase().includes(query)) || 
                (item.category?.toLowerCase().includes(query)) ||
                (item.authorName?.toLowerCase().includes(query)) ||
                (item.names?.toLowerCase().includes(query)) ||
                (item.tags?.toLowerCase().includes(query)) ||
                (item.codes?.toLowerCase().includes(query))
            );
            
            currentPage = 1;
            updateView();
        });

        // Inisialisasi Awal
        updateView();

    </script>
</body>
</html>
