    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Plus+Jakarta+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #121212;
            --gold: #d4af37;
            --text-light: #f5f5f5;
            --text-muted: #a0a0a0;
        }

        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Video Container */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border: 1px solid var(--gold);
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Card Custom */
        .card { background-color: var(--bg-card); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 0px; transition: 0.4s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-img-top { height: 200px; object-fit: cover; }

        h1, h3 { font-family: 'Playfair Display', serif; color: var(--gold); }
        .back-link { color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--gold); }

        /* Custom Button & Modal Styling */
        .btn-gold {
            color: var(--gold);
            background-color: transparent;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            background-color: var(--gold);
            color: var(--bg-dark);
        }
        .modal-custom-dark {
            background-color: var(--bg-card);
            border: 1px solid var(--gold);
        }
        .modal-header-custom {
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        /* Mengubah warna tombol close bawaan Bootstrap menjadi putih */
        .btn-close-white {
            filter: invert(1) grayscale(100%) brightness(200%);
        }
    </style>
</head>
